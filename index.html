<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Game RPG Somalia</title>
</head>
<body>
    <div>
        <input type="text" id="username" placeholder="Tên đăng nhập">
        <input type="password" id="password" placeholder="Mật khẩu">
        <button onclick="game.auth('register')">Đăng ký</button>
        <button onclick="game.auth('login')">Đăng nhập</button>
    </div>

    <h3>Chọn tộc:</h3>
    <div id="race-list"></div>

    <h3>Cửa hàng:</h3>
    <div id="shop-items"></div>
    
    <div>
        <p>Quái: <span id="n-name">Chưa tải</span></p>
        <p>HP: <span id="n-hp-current">0</span>/<span id="n-hp-max">0</span></p>
    </div>

    <script>
    // --- DỮ LIỆU ---
    const RACES = {
        'Cyborg': { atkMulti: 1.2, hpMulti: 1.1, reflectReduc: 0.15 },
        'Ma Tộc': { atkMulti: 1.5, hpMulti: 0.8, reflectReduc: -0.1 }
    };

    const MONSTERS = [
        { name: 'Bù Nhìn Rơm', hp: 200, gold: 20, exp: 30 },
        { name: 'Người Xương', hp: 500, gold: 50, exp: 100 },
        { name: 'Xương Cấp Cao', hp: 1000, gold: 150, exp: 200 },
        { name: 'Vua Xương', hp: 1200, gold: 200, exp: 250 },
        { name: 'Shadow', hp: 2500, gold: 500, exp: 1000 },
        { name: 'King Shadow', hp: 7200, gold: 1250, exp: 2575 }
    ];

    const SHOP_ITEMS = [
        { name: 'Kiếm Gỗ', price: 50, atk: 10, hp: 0 },
        { name: 'Giáp Da', price: 100, hp: 50, atk: 0 },
        { name: 'Kiếm Sắt', price: 200, hp: 0, atk: 25 },
        { name: 'Giáp Sắt', price: 250, hp: 75, atk: 5 },
        { name: 'Kiếm Uranium', price: 750, hp: 0, atk: 75 },
        { name: 'Áo Choàng Hoàng Gia', price: 999, hp: 250, atk: 25 }
    ];

    // --- HỆ THỐNG ---
    const game = {
        player: null,
        storageKey: 'SOMALIA_V14_DATA_',
        monsterIdx: 0,
        currentMonsterHP: 0,

        init() {
            const rl = document.getElementById('race-list');
            Object.keys(RACES).forEach(r => {
                rl.innerHTML += `<button onclick="game.selectRace('${r}')">Tộc ${r}</button>`;
            });

            const si = document.getElementById('shop-items');
            SHOP_ITEMS.forEach((item, i) => {
                si.innerHTML += `<button onclick="game.buy(${i})">${item.name} (${item.price}g)</button>`;
            });
        },

        auth(type) {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if (!u || !p) return alert("Nhập đủ thông tin!");
            
            const data = localStorage.getItem(this.storageKey + u);
            if (type === 'register') {
                if (data) return alert("Tài khoản đã tồn tại!");
                this.player = { user: u, pass: p, lv: 1, exp: 0, gold: 100, hp: 100, atk: 10 };
                this.save();
                alert("Đăng ký thành công!");
            } else {
                if (!data) return alert("Sai thông tin!");
                this.player = JSON.parse(data);
                if (this.player.pass !== p) return alert("Sai thông tin!");
                alert("Đăng nhập thành công!");
                this.loadMonster();
            }
        },

        loadMonster() {
            const m = MONSTERS[this.monsterIdx];
            this.currentMonsterHP = m.hp;
            document.getElementById('n-name').innerText = m.name;
            document.getElementById('n-hp-current').innerText = this.currentMonsterHP;
            document.getElementById('n-hp-max').innerText = m.hp;
        },

        save() {
            localStorage.setItem(this.storageKey + this.player.user, JSON.stringify(this.player));
        },

        buy(idx) {
            if (!this.player) return alert("Đăng nhập trước!");
            const item = SHOP_ITEMS[idx];
            if (this.player.gold < item.price) return alert("Không đủ tiền!");
            this.player.gold -= item.price;
            if (item.hp) this.player.hp += item.hp;
            if (item.atk) this.player.atk += item.atk;
            this.save();
            alert("Đã mua " + item.name);
        },

        selectRace(name) {
            if (!this.player) return alert("Đăng nhập trước!");
            this.player.race = name;
            alert("Đã chọn tộc " + name);
            this.save();
        }
    };

    game.init();
    </script>
</body>
</html>
